name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/ -q
      - name: Migration matches models
        run: |
          DATABASE_URL="sqlite:///./_ci_check.db" python -m alembic upgrade head
          DATABASE_URL="sqlite:///./_ci_check.db" python - <<'EOF'
          import sqlite3
          mig = sorted(r[0] for r in sqlite3.connect('_ci_check.db').execute(
              "select name from sqlite_master where type='table' and name not like 'alembic%'"))
          from app.database import Base
          from app import models  # noqa: F401
          assert mig == sorted(Base.metadata.tables.keys()), f"schema drift: {mig}"
          print(f"OK: {len(mig)} tables match")
          EOF

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Start backend (seeded)
        working-directory: backend
        run: |
          pip install -r requirements-dev.txt
          python seed.py
          nohup python -m uvicorn app.main:app --port 8000 &
      - name: Start frontend dev server
        working-directory: frontend
        run: |
          npm ci
          nohup npm run dev &
      - name: Install Playwright browser
        working-directory: frontend
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Wait for servers
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health && curl -sf -o /dev/null http://localhost:5173 && exit 0
            sleep 2
          done
          echo "servers did not come up" && exit 1
      - name: Run E2E suite
        working-directory: frontend
        run: npm run test:e2e
